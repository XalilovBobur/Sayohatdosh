{# Premium Filter Form Component #}

<form method="get" class="filter-form">
    <div class="filter-header">
        <div>
            <h3 class="filter-title">Hamrohlarni qidirish</h3>
            <p class="filter-subtitle">Joy, sana, transport va budjet bo‘yicha saralang</p>
        </div>

        <div class="filter-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="M21 21l-4.3-4.3"></path>
            </svg>
        </div>
    </div>

    <div class="filter-grid">
        <div class="filter-group">
            <label>Joy</label>
            {{ form.location }}
        </div>

        <div class="filter-group">
            <label>Sana dan</label>
            {{ form.travel_date_from }}
        </div>

        <div class="filter-group">
            <label>Sana gacha</label>
            {{ form.travel_date_to }}
        </div>

        <div class="filter-group">
            <label>Guruh turi</label>
            {{ form.preferred_group }}
        </div>

        <div class="filter-group">
            <label>Transport</label>
            {{ form.transport_type }}
        </div>

        <div class="filter-group">
            <label>Budjet min</label>
            {{ form.budget_from }}
        </div>

        <div class="filter-group">
            <label>Budjet max</label>
            {{ form.budget_to }}
        </div>
    </div>

    <div class="filter-actions">
        <button type="submit" class="filter-btn filter-btn-primary">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="M21 21l-4.3-4.3"></path>
            </svg>
            Qidirish
        </button>

        <a href="{% url 'travel_buddies:list' %}" class="filter-btn filter-btn-outline">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path d="M3 12a9 9 0 1 0 3-6.7"></path>
                <path d="M3 4v6h6"></path>
            </svg>
            Tozalash
        </a>
    </div>
</form>

<style>
    .filter-form {
        width: 100%;
        margin-bottom: 32px;
        padding: 24px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 22px 55px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(18px);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .filter-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 22px;
        padding-bottom: 18px;
        border-bottom: 1px solid rgba(15, 23, 42, 0.07);
    }

    .filter-title {
        margin: 0;
        font-size: 21px;
        line-height: 1.2;
        font-weight: 900;
        color: #0f172a;
        letter-spacing: -0.03em;
    }

    .filter-subtitle {
        margin: 6px 0 0;
        font-size: 14px;
        color: #64748b;
        font-weight: 500;
    }

    .filter-icon {
        width: 46px;
        height: 46px;
        border-radius: 17px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffffff;
        background: linear-gradient(135deg, #0f172a, #334155);
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.22);
        flex-shrink: 0;
    }

    .filter-icon svg,
    .filter-btn svg {
        width: 18px;
        height: 18px;
        stroke-width: 2.2;
    }

    .filter-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
    }

    .filter-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .filter-group label {
        font-size: 13px;
        font-weight: 800;
        color: #334155;
    }

    .filter-group select,
    .filter-group input {
        width: 100%;
        min-height: 46px;
        padding: 11px 13px;
        border-radius: 15px;
        border: 1px solid rgba(15, 23, 42, 0.12);
        background: #f8fafc;
        color: #0f172a;
        font-size: 14px;
        font-weight: 650;
        outline: none;
        transition: 0.2s ease;
        box-sizing: border-box;
    }

    .filter-group select:hover,
    .filter-group input:hover {
        background: #ffffff;
        border-color: rgba(15, 23, 42, 0.22);
    }

    .filter-group select:focus,
    .filter-group input:focus {
        background: #ffffff;
        border-color: #0f172a;
        box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.08);
    }

    .filter-actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 22px;
    }

    .filter-btn {
        height: 46px;
        padding: 0 22px;
        border-radius: 15px;
        border: 1px solid transparent;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 850;
        cursor: pointer;
        transition: 0.2s ease;
        white-space: nowrap;
    }

    .filter-btn-primary {
        color: #ffffff;
        background: #0f172a;
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.24);
    }

    .filter-btn-primary:hover {
        background: #1e293b;
        transform: translateY(-2px);
    }

    .filter-btn-outline {
        color: #0f172a;
        background: #ffffff;
        border-color: rgba(15, 23, 42, 0.14);
    }

    .filter-btn-outline:hover {
        background: #f8fafc;
        transform: translateY(-2px);
    }

    @media (max-width: 1100px) {
        .filter-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }
    }

    @media (max-width: 820px) {
        .filter-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
    }

    @media (max-width: 560px) {
        .filter-form {
            padding: 18px;
            border-radius: 22px;
        }

        .filter-header {
            align-items: flex-start;
        }

        .filter-title {
            font-size: 18px;
        }

        .filter-subtitle {
            font-size: 13px;
        }

        .filter-icon {
            width: 42px;
            height: 42px;
            border-radius: 15px;
        }

        .filter-grid {
            grid-template-columns: 1fr;
        }

        .filter-actions {
            flex-direction: column;
        }

        .filter-btn {
            width: 100%;
        }
    }
</style>
